<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF マスキングツール</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header" id="headerLogo" title="トップに戻る">
      <h1>PDF マスキングツール</h1>
      <p class="subtitle">AI送信前に個人情報をマスキング</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="toolbar-group">
        <label class="toolbar-label">ツール:</label>
        <button class="tool-btn active" data-tool="rect" title="墨消し（四角形マスク）">
          <svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="12" rx="1" fill="currentColor" opacity="0.85"/></svg>
          <span>墨消し</span>
        </button>
        <button class="tool-btn" data-tool="pen-thick" title="太消し（8px）">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 14C7 10 13 8 17 6" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/></svg>
          <span>太消し</span>
        </button>
        <button class="tool-btn" data-tool="pen-thin" title="細消し（2px）">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 14C7 10 13 8 17 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
          <span>細消し</span>
        </button>
        <button class="tool-btn" data-tool="free" title="自由消し">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 15C5 10 8 5 12 8C16 11 14 16 17 13" fill="currentColor" opacity="0.6" stroke="currentColor" stroke-width="1"/></svg>
          <span>自由消し</span>
        </button>
        <button class="tool-btn" id="clearAllBtn" title="ページ全体を墨消し">
          <svg width="20" height="20" viewBox="0 0 20 20"><rect x="1" y="1" width="18" height="18" rx="2" fill="currentColor" opacity="0.85"/></svg>
          <span>全消し</span>
        </button>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" data-tool="select" title="マスクを選択・移動・リサイズ">
          <svg width="20" height="20" viewBox="0 0 20 20"><path d="M4 2L4 16L8 12L12 16L14 14L10 10L14 10Z" fill="currentColor"/></svg>
          <span>選択</span>
        </button>
      </div>

      <div class="toolbar-group" id="drawOptionsGroup">
        <label class="toolbar-label">色:</label>
        <input type="color" id="maskColor" value="#000000" title="色">
      </div>
      <div class="toolbar-group" id="selectInfoGroup" style="display:none;">
        <span class="toolbar-hint">マスクをクリックで選択 → ドラッグで移動、ハンドルでリサイズ</span>
        <button class="action-btn danger" id="deleteSelBtn" title="選択中のマスクを削除" style="display:none;">🗑 削除</button>
      </div>

      <div class="toolbar-group">
        <button class="action-btn" id="undoBtn" title="元に戻す">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M5 8L2 5L5 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 5H12C14.2 5 16 6.8 16 9C16 11.2 14.2 13 12 13H8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          元に戻す
        </button>
        <button class="action-btn" id="clearPageBtn" title="このページのマスクをクリア">
          クリア
        </button>
      </div>

      <div class="toolbar-group">
        <button class="action-btn primary" id="exportBtn" title="マスク済みPDFをダウンロード">
          📥 PDFダウンロード
        </button>
      </div>
    </div>

    <!-- Page Navigation -->
    <div class="page-nav" id="pageNav" style="display:none;">
      <button id="prevPage" title="前のページ">◀</button>
      <span><span id="currentPage">1</span> / <span id="totalPages">1</span> ページ</span>
      <button id="nextPage" title="次のページ">▶</button>
      <div class="zoom-controls">
        <button id="zoomOut" title="縮小">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn" title="拡大">+</button>
        <button id="zoomFit" title="押すたびに切替：縦フィット→横フィット→100%">縦フィット</button>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-content">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="4" width="48" height="56" rx="4" stroke="#6366f1" stroke-width="3"/>
            <path d="M20 20H44M20 28H44M20 36H36" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
            <circle cx="46" cy="46" r="14" fill="#6366f1"/>
            <path d="M46 39V53M39 46H53" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <p class="drop-text">PDFファイルをドラッグ＆ドロップ</p>
          <p class="drop-or">または</p>
          <button class="file-btn" id="fileBtn">ファイルを選択</button>
          <input type="file" id="fileInput" accept=".pdf" hidden>
        </div>
      </div>

      <!-- Canvas Area -->
      <div class="canvas-wrapper" id="canvasWrapper" style="display:none;">
        <div class="canvas-container" id="canvasContainer">
          <canvas id="pdfCanvas"></canvas>
          <canvas id="maskCanvas"></canvas>
        </div>
      </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
      <div class="spinner"></div>
      <p id="loadingText">PDFを読み込み中...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
